<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Interview Prep</title>
<style>
:root{--red:#FF6247;--ink:#EAE6E1;--ink-soft:#AEA79F;--line:#3B3733;--bg:#151312;--card:#1F1D1B;--accent:#2B2825}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6}
.wrap{width:100%;max-width:640px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px}
h1{font-size:22px;margin-bottom:6px}
.sub{color:var(--ink-soft);font-size:14px;margin-bottom:26px}
.row{display:flex;gap:10px}
input[type=password]{flex:1;background:var(--accent);border:1px solid var(--line);border-radius:10px;padding:12px 16px;color:var(--ink);font-size:16px;outline:none}
input[type=password]:focus{border-color:var(--red)}
button{background:var(--red);color:#1a0d09;font-weight:700;border:none;border-radius:10px;padding:12px 22px;font-size:15px;cursor:pointer}
button:hover{filter:brightness(1.1)}
.err{color:var(--red);font-size:13.5px;margin-top:12px;min-height:18px}
.links{display:none;flex-direction:column;gap:14px}
a.doc{display:block;background:var(--accent);border:1px solid var(--line);border-radius:12px;padding:16px 20px;text-decoration:none;color:var(--ink);transition:border-color .15s}
a.doc:hover{border-color:var(--red)}
a.doc .t{font-weight:700;font-size:16px;color:var(--red);margin-bottom:3px}
a.doc .d{font-size:13.5px;color:var(--ink-soft)}
.foot{text-align:center;color:#6b655e;font-size:12px;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Interview Prep Library</h1>
    <div class="sub" id="sub">Enter the password to unlock the documents.</div>
    <div id="gate">
      <div class="row">
        <input type="password" id="pw" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">Unlock</button>
      </div>
      <div class="err" id="err"></div>
    </div>
    <div class="links" id="links"></div>
  </div>
  <div class="foot">Private study material</div>
</div>
<script>
const SALT='bk6bCAXV62cYbyAFGNv26Q==', IV='Lv2dJaJsxGhEJnui', ITER=150000,
CT='NijqCDQcAtK5ngHmD4mz6kQV/pzwIeTYkC5GGh/Rnl1J2i4gVq9SOKMftOMp7qc2zt1HXSwaSdj1I3bDUEo0zJeQBh06DKizq/QOimSQE3RADqGWoprpP0VD3s1QpkcDNghBS2N2zLOw6OHPfB0PdKT+perqejawtmIBt+xxpd2OKYdUAwAKtHnqCUlDwBo9sHg3shMben9pAMzQfRrmmAXfuy6PSES7eygU7dgg48XaDWSvueUfK4wcte0hp8c6t2c8OFGlsf6X9b059rgS9Sd0tUlAj8633RQfv/zlZZ5+pvmWkAkLbDxv8HisF+Q/Do+BH7+COgMD2RLKZCFazETnL9vI73/vxcjDnUcGm4SbxbiqULJKmQayWTI8Mh1LwAgz6xzhs1vc2SXAKAFLU+Rtb/gqAiPEiusuhgumhA3zonPUV7ShBOnMZfPhs41yi6lewX63TaB7kBbG58AUCvL+u/JZg63WkeMgdrEA9lywIy5367gpHXo+ot31jBacBMeFnsQxADzt9KWlHgC/0Xxl09BsGEoPzA+iddudDCwNh5vKkyt44QitgqrW97I0Q4aqGXn3PIr4pswUuk8gcUOkN21wF5zrR5d51tL8ZfonHpvaFg==';
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryDecrypt(pw){
  const keyMat=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  return JSON.parse(new TextDecoder().decode(pt));
}
function render(files){
  document.getElementById('gate').style.display='none';
  document.getElementById('sub').textContent='Documents unlocked.';
  const box=document.getElementById('links');
  box.style.display='flex';
  box.innerHTML=files.map(f=>'<a class="doc" href="'+f.file+'"><div class="t">'+f.title+'</div><div class="d">'+f.desc+'</div></a>').join('');
}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const e=document.getElementById('err');
  e.textContent='';
  try{
    const files=await tryDecrypt(pw);
    try{sessionStorage.setItem('prep-pw',pw)}catch(x){}
    render(files);
  }catch(x){e.textContent='Incorrect password.'}
}
(async()=>{
  let pw=null;
  try{pw=sessionStorage.getItem('prep-pw')}catch(x){}
  if(pw){try{render(await tryDecrypt(pw))}catch(x){}}
})();
</script>
</body>
</html>
